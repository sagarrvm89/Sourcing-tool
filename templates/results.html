<!DOCTYPE html>
<html>
<head>
    <title>Analysis Results</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    <h1>Analysis Results</h1>
</header>

<nav>
    <a href="/">Home</a>
    <a href="/resume-analyzer">Resume Analyzer</a>
    <a href="/adzuna-jobs">Adzuna Jobs</a>
    <a href="/jooble-jobs">Jooble Jobs</a>
    <a href="/dice-jobs">Dice Jobs</a>
    <a href="/privacy">Privacy</a>
</nav>

<div class="container">
    <div class="result-box">
        <h2>Match Score: {{ score }}%</h2>
    </div>

    <div class="result-box">
        <h3>Matched Keywords</h3>
        <ul>
            {% for word in matched %}
                <li>{{ word }}</li>
            {% endfor %}
        </ul>
    </div>

    <div class="result-box">
        <h3>Missing Keywords</h3>
        <ul>
            {% for word in missing %}
                <li>{{ word }}</li>
            {% endfor %}
        </ul>
    </div>

    <a href="/resume-analyzer"><button>Analyze Another Resume</button></a>
</div>

</body>
</html>
