<!DOCTYPE html>
<html>
<head>
    <title>Analysis Results</title>
</head>
<body>
    <h1>Analysis Results</h1>

    <h2>Match Score: {{ score }}%</h2>

    <h3>Matched Keywords</h3>
    <ul>
        {% for word in matched %}
            <li>{{ word }}</li>
        {% endfor %}
    </ul>

    <h3>Missing Keywords</h3>
    <ul>
        {% for word in missing %}
            <li>{{ word }}</li>
        {% endfor %}
    </ul>

    <br>
    <a href="/resume-analyzer">Analyze Another Resume</a>
    <br>
    <a href="/">Back Home</a>
</body>
</html>
